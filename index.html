<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מדריך סל המזון</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
:root { --bg:#F5F4F0; --primary:#1E4D2B; }
body { font-family:'Heebo',sans-serif; background:var(--bg); color:#111; }
.header { background:var(--primary); color:white; padding:22px 20px 18px; text-align:center; }
.header h1 { font-size:clamp(1.4rem,3.5vw,2rem); font-weight:800; margin-bottom:5px; }
.header-sub { font-size:.76rem; opacity:.75; line-height:1.9; }
.controls { padding:14px 18px 8px; max-width:1400px; margin:0 auto; display:flex; flex-direction:column; gap:9px; }
.search-wrap { position:relative; }
.search-wrap svg { position:absolute; right:13px; top:50%; transform:translateY(-50%); color:#9CA3AF; pointer-events:none; }
.search { width:100%; padding:10px 42px 10px 14px; border:2px solid #D1D5DB; border-radius:10px; font-size:.95rem; font-family:'Heebo',sans-serif; background:white; outline:none; direction:rtl; transition:border-color .2s; }
.search:focus { border-color:var(--primary); }
.filters { display:flex; flex-wrap:wrap; gap:6px; }
.fbtn { padding:5px 13px; border-radius:99px; border:2px solid currentColor; background:white; font-size:.77rem; font-weight:700; font-family:'Heebo',sans-serif; cursor:pointer; transition:all .15s; white-space:nowrap; }
.fbtn:hover,.fbtn.on { color:white!important; background:currentColor!important; }
.sec { max-width:1400px; margin:0 auto; padding:0 18px 22px; }
.sec-head { display:flex; align-items:center; gap:10px; font-size:1.05rem; font-weight:800; padding:16px 0 12px; }
.sec-head::after { content:''; flex:1; height:2px; background:currentColor; opacity:.18; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(175px,1fr)); gap:13px; }
.card { background:white; border-radius:14px; overflow:hidden; box-shadow:0 2px 10px rgba(0,0,0,.07); border-top:5px solid var(--card-color,#ccc); display:flex; flex-direction:column; transition:transform .18s,box-shadow .18s; }
.card:hover { transform:translateY(-3px); box-shadow:0 8px 20px rgba(0,0,0,.12); }
.card-img-wrap { height:130px; display:flex; align-items:center; justify-content:center; background:#F9FAFB; overflow:hidden; position:relative; }
.card-img { width:100%; height:100%; object-fit:cover; display:none; }
.card-img.loaded { display:block; }
.card-fallback { font-size:3.8rem; line-height:1; }
.card-body { padding:4px 11px 12px; flex:1; }
.lang-row { display:flex; align-items:baseline; gap:6px; padding:3.5px 0; border-bottom:1px solid #F3F4F6; }
.lang-row:last-child { border-bottom:none; }
.lflag { font-size:.7rem; flex-shrink:0; width:17px; }
.lname { font-size:.82rem; font-weight:600; line-height:1.3; flex:1; color:#1F2937; }
.lname.rtl { direction:rtl; text-align:right; }
.print-btn { position:fixed; bottom:20px; left:20px; background:var(--primary); color:white; border:none; border-radius:10px; padding:10px 18px; font-size:.88rem; font-weight:700; font-family:'Heebo',sans-serif; cursor:pointer; box-shadow:0 4px 16px rgba(0,0,0,.25); display:flex; align-items:center; gap:6px; z-index:50; transition:opacity .2s; }
.print-btn:hover { opacity:.85; }
.empty { text-align:center; padding:44px; color:#9CA3AF; font-size:1rem; display:none; }
@media (max-width:520px) { .grid { grid-template-columns:repeat(auto-fill,minmax(145px,1fr)); gap:9px; } }
@media print {
  @page { size:A4; margin:8mm; }
  .controls,.print-btn { display:none!important; }
  body { background:white; }
  .header { background:#1E4D2B!important; -webkit-print-color-adjust:exact; print-color-adjust:exact; color:white!important; padding:10px 14px; border-radius:6px; margin-bottom:8px; }
  .header h1 { font-size:14pt; margin-bottom:3px; }
  .header-sub { font-size:7pt; }
  .sec { padding:0 0 8px; max-width:100%; }
  .sec-head { font-size:9pt; font-weight:800; padding:7px 0 5px; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .grid { grid-template-columns:repeat(5,1fr); gap:5px; }
  .card { border-radius:6px; box-shadow:none; border:1px solid #ddd; border-top-width:4px; -webkit-print-color-adjust:exact; print-color-adjust:exact; break-inside:avoid; page-break-inside:avoid; }
  .card-img-wrap { height:75px; }
  .card-img { display:block!important; }
  .card-fallback { font-size:2rem; }
  .card-body { padding:2px 7px 7px; }
  .lang-row { padding:2px 0; }
  .lflag { font-size:.58rem; width:14px; }
  .lname { font-size:6pt; }
}
</style>
</head>

const imgCache={};
async function getWikiImage(title,lang='en'){
  if(imgCache[title]!==undefined)return imgCache[title];
  try{
    const r=await fetch(`https://${lang}.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=pageimages&pithumbsize=300&format=json&origin=*`);
    const d=await r.json();
    const pages=d?.query?.pages;
    const src=pages&&Object.values(pages)[0]?.thumbnail?.source||null;
    imgCache[title]=src;
    return src;
  }catch{imgCache[title]=null;return null;}
}

let currentCat='all';

function makeCard(item){
  const color=CATS[item.cat]?.color||'#999';
  const id='c'+Math.random().toString(36).slice(2,8);
  const langs=LANGS.map(l=>`<div class="lang-row"><span class="lflag">${l.flag}</span><span class="lname${l.dir==='rtl'?' rtl':''}">${item[l.key]}</span></div>`).join('');
  const imgP = item.imgSrc ? Promise.resolve(item.imgSrc) : getWikiImage(item.wiki, item.wikiLang||'en');
  imgP.then(src=>{
    const img=document.getElementById('img_'+id);
    const fb=document.getElementById('fb_'+id);
    if(!img)return;
    if(src){
      img.onload=()=>{img.classList.add('loaded');if(fb)fb.style.display='none';};
      img.onerror=()=>{img.style.display='none';if(fb)fb.style.display='block';};
      img.src=src;
    }
  });
  return `<div class="card" data-cat="${item.cat}" data-search="${Object.values(item).join(' ').toLowerCase()}" style="--card-color:${color}"><div class="card-img-wrap"><img id="img_${id}" class="card-img" alt="${item.he}"/><span id="fb_${id}" class="card-fallback">${item.emoji}</span></div><div class="card-body">${langs}</div></div>`;
}

function render(){
  const root=document.getElementById('content-root');
  const q=document.getElementById('search').value.toLowerCase().trim();
  const filtered=ITEMS.filter(i=>(currentCat==='all'||i.cat===currentCat)&&(!q||Object.values(i).some(v=>String(v).toLowerCase().includes(q))));
  const empty=document.getElementById('empty');
  if(!filtered.length){root.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  const byCat={};
  filtered.forEach(i=>{(byCat[i.cat]=byCat[i.cat]||[]).push(i);});
  const ORDER=['fruits','vegetables','grains','bakery','sweet','canned','condiments','snacks','drinks','legumes'];
  root.innerHTML=ORDER.filter(c=>byCat[c]).map(cat=>{
    const{label,color}=CATS[cat];
    return `<div class="sec"><div class="sec-head" style="color:${color}">${label}</div><div class="grid">${byCat[cat].map(makeCard).join('')}</div></div>`;
  }).join('');
}

function setCat(cat,btn){currentCat=cat;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');render();}
function doFilter(){render();}
render();
